<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>LP Prospector DEV</title>
  <style>
    body { width: 320px; background: #080c10; color: #e8edf2; font-family: sans-serif; padding: 16px; margin: 0; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #1e2d3d; }
    .logo { background: #2563eb; color: white; padding: 4px 8px; font-weight: bold; font-size: 14px; border-radius: 3px; }
    .env-badge { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #22c55e; padding: 2px 8px; font-size: 10px; font-weight: 700; border-radius: 20px; }
    .status { background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.3); color: #00c896; padding: 10px; font-size: 11px; text-align: center; border-radius: 4px; margin-bottom: 12px; }
    .status.error { background: rgba(255,59,92,0.1); border-color: rgba(255,59,92,0.3); color: #ff3b5c; }
    .hint { font-size: 12px; color: #8899aa; line-height: 1.5; background: #0d1219; padding: 12px; border-radius: 4px; }
    .btn { width: 100%; padding: 12px; background: #2563eb; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 12px; border-radius: 4px; font-size: 14px; }
    .btn:hover { background: #3b82f6; }
    .btn.secondary { background: #1e2d3d; margin-top: 6px; }
    .btn.secondary:hover { background: #243547; }
    .footer { margin-top: 16px; font-size: 10px; color: #4a5e70; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">LP</div>
    <div>
      <strong>DEV V1.0</strong> — Cromosit IT
    </div>
    <span class="env-badge">DEV</span>
  </div>

  <div id="syncStatus" class="status">⟳ Verificando...</div>

  <div class="hint">
    <strong>💡 Como usar:</strong><br><br>
    1. Vá a um perfil no LinkedIn.<br>
    2. Clique no botão azul <strong>⚡ Capturar</strong> que aparece.<br>
    3. Ou vá a uma busca e use <strong>Capturar Busca</strong>.
  </div>

  <button class="btn" id="btnAbrirCRM">Abrir CRM (localhost:5173)</button>
  <button class="btn secondary" id="btnCapturarBusca">⚡ Capturar Busca Atual</button>

  <div class="footer">CROMOSIT IT · Ambiente Isolado 01_DEV</div>

  <script src="popup.js"></script>
</body>
</html>
